name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: go mod download

      - name: Run Build
        run: go build -v ./...

      - name: Run Tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Check Doctor
        run: go run cmd/nestgo/main.go doctor
