name: Bug Report
description: File a report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you did and what happened.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce?
      description: Provide the steps to reproduce the behavior.
      placeholder: |
        1. Run '...'
        2. Enter '...'
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: NestGo Version
      description: Run `nestgo -v` to get the version.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment Info
      description: OS, Go version, etc.
      placeholder: Windows 11, Go 1.22
